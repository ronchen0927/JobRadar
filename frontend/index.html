<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="104 人力銀行職缺搜尋工具 — 快速搜索符合條件的職位">
  <title>104 職缺搜尋</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <!-- Theme toggle -->
  <button id="theme-toggle" class="theme-toggle" aria-label="切換深色/淺色模式">
    <span class="theme-toggle__icon">🌙</span>
  </button>

  <!-- Background glow effects -->
  <div class="bg-glow bg-glow--1"></div>
  <div class="bg-glow bg-glow--2"></div>

  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header__logo">
        <span class="header__icon">🔍</span>
        <h1 class="header__title">104 職缺搜尋</h1>
      </div>
      <p class="header__subtitle">快速搜索符合條件的職位</p>
    </header>

    <!-- Search Form -->
    <section class="search-card">
      <form id="search-form">
        <!-- Keyword -->
        <div class="form-group">
          <label class="form-label" for="keyword">
            <span class="form-label__icon">💼</span>
            搜尋關鍵字
          </label>
          <input type="text" id="keyword" class="form-input" placeholder="職稱、公司名、技能專長..." value="Django" required>
        </div>

        <!-- Pages -->
        <div class="form-group">
          <label class="form-label" for="pages">
            <span class="form-label__icon">📄</span>
            爬取頁數
          </label>
          <input type="number" id="pages" class="form-input" value="5" min="1" max="20">
        </div>

        <!-- Area checkboxes (dynamically loaded) -->
        <div class="form-group">
          <label class="form-label">
            <span class="form-label__icon">📍</span>
            選擇地區
          </label>
          <div id="area-options" class="checkbox-grid">
            <!-- Loaded by JS -->
          </div>
        </div>

        <!-- Experience checkboxes (dynamically loaded) -->
        <div class="form-group">
          <label class="form-label">
            <span class="form-label__icon">⏳</span>
            經歷要求
          </label>
          <div id="experience-options" class="checkbox-grid">
            <!-- Loaded by JS -->
          </div>
        </div>

        <button type="submit" id="search-btn" class="btn-search">
          <span class="btn-search__text">開始搜尋</span>
          <span class="btn-search__icon">→</span>
        </button>
      </form>
    </section>

    <!-- Loading -->
    <section id="loading" class="loading hidden">
      <div class="loading__spinner"></div>
      <p class="loading__text">正在搜尋職缺中...</p>
    </section>

    <!-- Results -->
    <section id="results" class="results hidden">
      <div class="results__header">
        <h2 class="results__title">搜尋結果</h2>
        <div class="results__meta">
          <span id="result-count" class="results__badge"></span>
          <span id="result-time" class="results__time"></span>
        </div>
      </div>
      <div class="table-wrapper">
        <table class="results-table">
          <thead>
            <tr>
              <th>刊登日期</th>
              <th>職位</th>
              <th>公司名稱</th>
              <th>城市</th>
              <th>經歷</th>
              <th>最低學歷</th>
              <th>薪水</th>
            </tr>
          </thead>
          <tbody id="results-body">
          </tbody>
        </table>
      </div>
    </section>

    <!-- Error -->
    <section id="error" class="error-card hidden">
      <span class="error-card__icon">⚠️</span>
      <p id="error-message" class="error-card__text"></p>
      <button id="error-dismiss" class="btn-dismiss">關閉</button>
    </section>
  </div>

  <script src="js/app.js"></script>
</body>

</html>
